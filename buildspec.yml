version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install -g @google/clasp
  pre_build:
    commands:
      # Retrieve secret from AWS and convert to clasp format
      - aws secretsmanager get-secret-value --secret-id clasp/auth/google --query SecretString --output text | jq '.tokens.default' > ~/.clasprc.json
      # Debug: Verify the token file
      - echo "Token file created successfully"
      - echo "First 5 lines of .clasprc.json:"
      - head -5 ~/.clasprc.json
  build:
    commands:
      - echo "Attempting clasp push to Google Apps Script..."
      - clasp push -f
      - echo "Successfully pushed to Google Apps Script!"
artifacts:
  files:
    - '**/*'