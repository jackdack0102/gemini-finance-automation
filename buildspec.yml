version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install -g @google/clasp
  pre_build:
    commands:
      # Retrieve secret from AWS and save directly (it already has the correct clasp format)
      - aws secretsmanager get-secret-value --secret-id clasp/auth/google --query SecretString --output text > ~/.clasprc.json
      # Verify access_token is present in the file
      - grep -q "access_token" ~/.clasprc.json && echo "✓ access_token found" || echo "✗ access_token NOT found"
  build:
    commands:
      - echo "Attempting clasp push to Google Apps Script..."
      - clasp push -f
      - echo "Successfully pushed to Google Apps Script!"
artifacts:
  files:
    - '**/*'