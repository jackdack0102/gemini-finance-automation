version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install -g @google/clasp
  pre_build:
    commands:
      # Retrieve secret from AWS and reformat for clasp (extract from nested structure)
      - aws secretsmanager get-secret-value --secret-id clasp/auth/google --query SecretString --output text | jq '{access_token: .tokens.default.access_token, client_id: .tokens.default.client_id, client_secret: .tokens.default.client_secret, refresh_token: .tokens.default.refresh_token}' > ~/.clasprc.json
      # Debug: Check if file was created and has content
      - echo "=== Checking .clasprc.json ===" 
      - cat ~/.clasprc.json
      - echo "=== File check complete ==="
  build:
    commands:
      - echo "Pushing code to Google Apps Script..."
      - clasp push -f
artifacts:
  files:
    - '**/*'