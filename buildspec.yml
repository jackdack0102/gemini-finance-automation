version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install -g @google/clasp
  pre_build:
    commands:
      # Retrieve secret from AWS and reformat for clasp
      - aws secretsmanager get-secret-value --secret-id clasp/auth/google --query SecretString --output text | jq '.tokens.default | {access_token, client_id, client_secret, refresh_token}' > ~/.clasprc.json
      # Debug: Check file content
      - echo "=== Checking .clasprc.json ===" 
      - cat ~/.clasprc.json
      - echo "=== File check complete ==="
  build:
    commands:
      - echo "Pushing code to Google Apps Script..."
      - clasp push -f
artifacts:
  files:
    - '**/*'