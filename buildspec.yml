version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install -g @google/clasp
  pre_build:
    commands:
      # Retrieve secret from AWS - keep the nested structure that clasp expects
      - aws secretsmanager get-secret-value --secret-id clasp/auth/google --query SecretString --output text > ~/.clasprc.json
      # Debug: Check file content
      - echo "=== Checking .clasprc.json ===" 
      - cat ~/.clasprc.json
      - echo "Current directory:" && pwd
      - echo "Files in directory:" && ls -la
      - echo "Contents of .clasp.json:" && cat .clasp.json
      - echo "Contents of .clasprc.json:" && cat ~/.clasprc.json | head -20
      - echo "=== File check complete ==="
  build:
    commands:
      - echo "Attempting clasp push to Google Apps Script..."
      - clasp push -f
      - echo "Successfully pushed to Google Apps Script!"
artifacts:
  files:
    - '**/*'