version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install -g @google/clasp
      - which clasp
      - clasp --version
  pre_build:
    commands:
      # Retrieve secret from AWS and save directly
      - aws secretsmanager get-secret-value --secret-id clasp/auth/google --query SecretString --output text | jq . > ~/.clasprc.json
      # Verify access_token is present in the file
      - echo "=== Validate JSON structure ==="
      - cat ~/.clasprc.json | jq '.token.access_token' || exit 1
  build:
    commands:
      - echo "Attempting clasp push to Google Apps Script..."
      - clasp push -f
      - echo "Successfully pushed to Google Apps Script!"
artifacts:
  files:
    - '**/*'