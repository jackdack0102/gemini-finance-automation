version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install -g @google/clasp
  pre_build:
    commands:
      # Retrieve the actual secret value from AWS Secrets Manager
      - aws secretsmanager get-secret-value --secret-id clasp/auth/google --query SecretString --output text > ~/.clasprc.json
      # Debug: Check if file was created and has content
      - echo "=== Checking .clasprc.json ===" 
      - cat ~/.clasprc.json
      - echo "=== File check complete ==="
  build:
    commands:
      - echo "Pushing code to Google Apps Script..."
      - clasp push -f
artifacts:
  files:
    - '**/*'